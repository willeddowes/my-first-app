<!DOCTYPE html>
<html>
  <head>
    <title>My First App</title>
    <style>
      body {
        background: #0a0a0f;
        color: #e8e8f0;
        font-family: sans-serif;
        max-width: 600px;
        margin: 80px auto;
        padding: 0 20px;
      }
      button {
        background: #6366f1;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <h1>My Counter</h1>
    <p id="count">0</p>
    <button onclick="increment()">Add 1</button>
    <button onclick="reset()">Reset</button>

    <script>
        let count = 0

        function increment() {
            count = count + 1
            document.getElementById('count').innerText = count
        }
        
        function reset() {
            count = 0
            document.getElementById('count').innerText = count
        }
    </script>
  </body>
</html>
